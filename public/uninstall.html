<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Uninstalled</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #09090e;
      --card-bg: rgba(18, 18, 26, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --accent-glow: rgba(168, 85, 247, 0.25);
      --button-bg: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      --button-hover: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 50% 20%, var(--accent-glow) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-wrapper {
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 30%, #d1d5db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .feedback-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 28px;
      background: var(--button-bg);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .feedback-btn:hover {
      background: var(--button-hover);
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(124, 58, 237, 0.5);
    }

    .feedback-btn svg {
      width: 20px;
      height: 20px;
      transition: transform 0.2s ease;
    }

    .feedback-btn:hover svg {
      transform: translateX(4px);
    }

    .footer-note {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(156, 163, 175, 0.6);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon-wrapper">👋</div>

    <h1>We're sorry to see you go</h1>
    <p>
      The extension has been uninstalled from your browser. Thank you for using our extension! We'd love to know how we
      can improve.
    </p>

    <a id="feedback-link" href="https://runtimedev.vercel.app/feedback" target="_blank" rel="noopener noreferrer"
      class="feedback-btn">
      <span>Share Your Feedback</span>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
      </svg>
    </a>

    <div class="footer-note">
      Your feedback helps us build better tools.
    </div>
  </div>
</body>

</html>
